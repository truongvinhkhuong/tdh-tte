# TTE Monorepo - Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# Ports: Web=4000, CMS=4001, Backend=4002, PostgreSQL=5434, Redis=6381

services:
  # ============================================
  # DATABASE (Port 5434 to avoid conflict)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: tte_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============================================
  # CACHE & QUEUE (Port 6381 to avoid conflict)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: tte_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ============================================
  # CMS (Payload + Next.js) - Port 4001
  # ============================================
  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    container_name: tte_cms
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: https://cms.toanthang.vn
      FRONTEND_URL: https://toanthang.vn
      BACKEND_URL: http://backend:4002
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "127.0.0.1:4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============================================
  # BACKEND (NestJS - AI Agent) - Port 4002
  # ============================================
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: tte_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4002
      PAYLOAD_API_URL: http://cms:4001/api
      PAYLOAD_API_KEY: ${PAYLOAD_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_URL: https://toanthang.vn
      CMS_URL: https://cms.toanthang.vn
    ports:
      - "127.0.0.1:4002:4002"
    depends_on:
      redis:
        condition: service_healthy
      cms:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================
  # WEB (Next.js Frontend) - Port 4000
  # ============================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: tte_web
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
      NEXT_PUBLIC_CMS_URL: http://cms:4001
      NEXT_PUBLIC_USE_CMS: "true"
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      cms:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: tte_network
