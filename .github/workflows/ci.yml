name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-git --redact --verbose

  verify:
    name: Verify
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tte_cms
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5434/tte_cms
      PAYLOAD_SECRET: test_payload_secret_minimum_32_characters
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:4001
      FRONTEND_URL: http://localhost:4000
      BACKEND_URL: http://localhost:4002
      CMS_URL: http://localhost:4001
      NEXT_PUBLIC_CMS_URL: http://localhost:4001
      NEXT_PUBLIC_SITE_URL: http://localhost:4000
      NEXT_PUBLIC_USE_CMS: "false"
      REDIS_HOST: localhost
      REDIS_PORT: 6381
      CHATBOT_CACHE_ENABLED: "false"
      DEEPSEEK_API_KEY: test_deepseek_key
      OPENAI_API_KEY: test_openai_key
      LLAMA_CLOUD_API_KEY: test_llama_key
      QDRANT_URL: http://localhost:6333
      QDRANT_API_KEY: test_qdrant_key
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify TypeScript and lint
        run: pnpm verify
      - name: Backend tests
        run: pnpm test:backend
      - name: CMS integration tests
        run: pnpm test:cms
      - name: Install AI Engine test dependencies
        run: |
          python3 -m pip install uv
          uv pip install --system -e "apps/ai-engine[dev]"
      - name: AI tests
        run: pnpm test:ai
