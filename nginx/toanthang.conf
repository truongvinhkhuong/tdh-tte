# ============================================
# TTE Monorepo - Nginx Configuration
# Domain: toanthang.vn
# ============================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

# Upstream servers
upstream tte_web {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream tte_cms {
    server 127.0.0.1:4001;
    keepalive 32;
}

upstream tte_backend {
    server 127.0.0.1:4002;
    keepalive 32;
}

# ============================================
# Main Website - toanthang.vn
# ============================================
server {
    listen 80;
    server_name toanthang.vn www.toanthang.vn;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name toanthang.vn www.toanthang.vn;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/toanthang.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toanthang.vn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req zone=general_limit burst=50 nodelay;

    # Proxy to Next.js frontend
    location / {
        proxy_pass http://tte_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Static files caching
    location /_next/static {
        proxy_pass http://tte_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API routes to backend (if needed)
    location /api/ai {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://tte_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================
# CMS Admin - cms.toanthang.vn
# ============================================
server {
    listen 80;
    server_name cms.toanthang.vn;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cms.toanthang.vn;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/cms.toanthang.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cms.toanthang.vn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Client max body size for media uploads
    client_max_body_size 100M;

    # Rate limiting for API
    location /api {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://tte_cms;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Admin panel and everything else
    location / {
        proxy_pass http://tte_cms;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ============================================
# Backend API - api.toanthang.vn (Optional)
# ============================================
server {
    listen 80;
    server_name api.toanthang.vn;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.toanthang.vn;

    ssl_certificate /etc/letsencrypt/live/api.toanthang.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.toanthang.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Rate limiting
    limit_req zone=api_limit burst=30 nodelay;

    location / {
        proxy_pass http://tte_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://tte_backend/api/health;
        access_log off;
    }
}
